name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        # Repo declares requires-python >=3.13 (pyproject.toml).
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Stage public data
        # Live download with committed-cache fallback (data/cache/), so CI never
        # depends on gitignored raw files — falls back to committed cache offline.
        run: python -c "from src.public_data.fetch_public_data import fetch_all; fetch_all()"
      - name: Run tests
        run: python -m pytest
